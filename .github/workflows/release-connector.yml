name: Release connector

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-connector.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v1.0.0
      RELEASE_TITLE: Canva Connector 1.0.0
      ASSET_NAME: canva_connector.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Piwigo plugin zip
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release "$ASSET_NAME"
          mkdir -p release/canva_connector

          git ls-files | grep -v '^.github/' | while IFS= read -r file; do
            mkdir -p "release/canva_connector/$(dirname "$file")"
            cp "$file" "release/canva_connector/$file"
          done

          cd release
          zip -r "../$ASSET_NAME" canva_connector
          cd ..

          unzip -Z1 "$ASSET_NAME" | grep -qx 'canva_connector/'
          if unzip -Z1 "$ASSET_NAME" | grep -E '(^canva_connector/\.git/|\.DS_Store|^canva_connector-[^/]+/)'; then
            echo "Unexpected files in release archive"
            exit 1
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET_NAME" --clobber
          else
            gh release create "$RELEASE_TAG" "$ASSET_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file CHANGELOG.md
          fi
